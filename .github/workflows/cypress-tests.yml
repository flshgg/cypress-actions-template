name: Cypress Tests

on:
  workflow_dispatch: 
    inputs:
      cli:
        description: Run by Cypress Command Line
        default: yarn cypress run

jobs:
  Cypress-electron-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6.0.2
        
      - name: Install dependencies
        run: yarn install
        
      - name: Run E2E tests
        run: ${{ github.event.inputs.cli }}
