name: Cypress Tests

on:
  workflow_dispatch: 
    inputs:
      cli:
        description: Run by Cypress Node Command 
        default: node runner.js

jobs:
  Cypress-electron-tests:
    runs-on: ubuntu-latest
    container: 
      image: cypress/browsers:node-20.18.0-chrome-130.0.6723.69-1-ff-131.0.3-edge-130.0.2849.52-1
      options: --user 1001 --ipc=host
    steps:
      - name: Get code
        uses: actions/checkout@v6
        
      - name: Install dependencies
        run: yarn install
        
      - name: Run E2E tests
        run: ${{ github.event.inputs.cli }}
