name: Cypress Cloud

on:
  workflow_dispatch: 
    inputs:
      spec:
        description: Run by Cypress Command Line
        default: cypress/e2e/*

jobs:
  Cypress-e2e-electron:
    runs-on: ubuntu-latest
    container: 
      image: cypress/browsers:node-20.18.0-chrome-130.0.6723.69-1-ff-131.0.3-edge-130.0.2849.52-1
      options: --user 1001
    strategy:
      fail-fast: false
    steps:
      - name: Get code
        uses: actions/checkout@v6.0.2
        
      - name: Cypress run
        uses: cypress-io/github-action@v6.5.0
        with:
            install-command: yarn install
            browser: electron
            record: true
            group: UI Electron
            spec: ${{ github.event.inputs.spec }}
        env:
            CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  Cypress-e2e-chrome:
    needs: Cypress-e2e-electron
    runs-on: ubuntu-latest
    container: 
      image: cypress/browsers:node-20.18.0-chrome-130.0.6723.69-1-ff-131.0.3-edge-130.0.2849.52-1
      options: --user 1001
    strategy:
      fail-fast: false
    steps:
      - name: Get code
        uses: actions/checkout@v6.0.2
        
      - name: Cypress run
        uses: cypress-io/github-action@v6.5.0
        with:
            install-command: yarn install
            browser: chrome
            record: true
            group: UI Chrome
            spec: ${{ github.event.inputs.spec }}
        env:
            CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}            
  Cypress-e2e-firefox:
    needs: Cypress-e2e-electron
    runs-on: ubuntu-latest
    container: 
      image: cypress/browsers:node-24.15.0-chrome-147.0.7727.101-1-ff-150.0-edge-147.0.3912.60-1
      options: --user 1001 --ipc=host
    strategy:
      fail-fast: false
    steps:
      - name: Get code
        uses: actions/checkout@v6.0.2
        
      - name: Cypress run
        uses: cypress-io/github-action@v6.5.0
        with:
            install-command: yarn install
            browser: firefox
            record: true
            group: UI Firefox
            spec: ${{ github.event.inputs.spec }}
        env:
            CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
